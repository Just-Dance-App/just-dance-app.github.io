<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Download Just Dance Controller</title>
<script>
function redirect() {
  var ua = navigator.userAgent || navigator.vendor || window.opera;

  if (/android/i.test(ua)) {
    window.location.href = "https://play.google.com/store/apps/details?id=com.ubisoft.dance.justdancecontroller2023";
  } 
  else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
    window.location.href = "https://apps.apple.com/it/app/just-dance-controller/id1634629424";
  } 
  else {
    document.getElementById("links").style.display = "block";
  }
}
</script>
</head>

<body onload="redirect()">
<p>Redirecionando...</p>

<div id="links" style="display:none">
<p>Escolha sua plataforma:</p>
<a href="https://play.google.com/store/apps/details?id=com.ubisoft.dance.justdancecontroller2023">Android</a><br>
<a href="https://apps.apple.com/it/app/just-dance-controller/id1634629424">iPhone</a>
</div>

</body>
</html>
